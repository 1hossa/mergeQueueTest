name: CI Merge Queue

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: mq-${{ github.ref }}
  cancel-in-progress: true

jobs:
  heavy-suite:
    uses: ./.github/workflows/heavy-suite.yml
    with:
      tests: 1400
      compression: 220
