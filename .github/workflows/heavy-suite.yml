name: Heavy Test Suite

on:
  workflow_call:
    inputs:
      tests:
        description: "Approximate number of tests in full suite"
        required: false
        type: number
        default: 1400
      compression:
        description: "How much to compress logical test time for demo speed"
        required: false
        type: number
        default: 220

jobs:
  test:
    name: shard-${{ matrix.shard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run simulated heavy tests
        run: |
          node src/ci/run-heavy-tests.js \
            --tests=${{ inputs.tests }} \
            --shards=8 \
            --shard=${{ matrix.shard }} \
            --compression=${{ inputs.compression }}

  report:
    name: report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "## Heavy Suite Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR number: ${{ github.event.pull_request.number || 'n/a' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Merge group head sha: ${{ github.event.merge_group.head_sha || 'n/a' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Shards: 8" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tests (logical): ${{ inputs.tests }}" >> "$GITHUB_STEP_SUMMARY"

  gate:
    name: gate
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Enforce suite result
        run: |
          echo "test result: ${{ needs.test.result }}"
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Heavy suite failed"
            exit 1
          fi
          echo "Heavy suite passed"
